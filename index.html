<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación 15 - Isabella</title>

<!-- Fuente elegante -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(#0f1c3f,#1c2f6b);
color:white;
text-align:center;
overflow-x:hidden;
}

/* títulos elegantes */
h1, h2 {
font-family: 'Great Vibes', cursive;
letter-spacing: 2px;
}

/* cielo */
.cielo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.estrella{
position:absolute;
font-size:30px;
animation: caer linear forwards;
}

@keyframes caer{
0%{transform:translateY(-10px);opacity:1;}
100%{transform:translateY(100vh);opacity:0;}
}

/* corona */
.corona{
font-size:130px;
margin-top:40px;
animation: flotar 3s ease-in-out infinite, brillo 2s infinite;
}

@keyframes flotar{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

@keyframes brillo{
0%{filter: drop-shadow(0 0 5px #cfd8ff);}
50%{filter: drop-shadow(0 0 25px #ffffff);}
100%{filter: drop-shadow(0 0 5px #cfd8ff);}
}

/* secciones */
.section{
padding:80px 40px;
}

.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}

.fade.visible{
opacity:1;
transform:translateY(0);
}

.btn{
background:white;
color:#0a1f44;
padding:15px 25px;
border-radius:30px;
text-decoration:none;
display:inline-block;
margin-top:20px;
}

img{
width:80%;
border-radius:20px;
margin-top:20px;
}

</style>
</head>

<body>

<!-- MÚSICA -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="cielo"></div>

<div class="corona">👑</div>
<h1>Mis 15</h1>
<h2>Isabella</h2>

<div class="section">
  <h2>✨ Estás invitado a una noche única ✨</h2>
</div>

<div class="section fade">
  <h2>Faltan:</h2>
  <h1 id="contador"></h1>
</div>

<div class="section fade">
  <h2>📅 16 Mayo 2026 - 21:00 hs</h2>
  <h3>📍 Belgrano 1581</h3>

  <a class="btn" href="https://www.google.com/maps/search/?api=1&query=Belgrano+1581" target="_blank">
    Ver ubicación 📍
  </a>
</div>

<div class="section fade">
<img src="foto 4.jpeg">
<img src="foto 10.jpeg">
<img src="foto 11.jpeg">
<img src="foto 12.jpeg">
<img src="foto 13.jpeg">
<img src="foto 3.jpeg">
<img src="foto 6.jpeg">
<img src="foto 7.jpeg">
<img src="foto 8.jpeg">
<img src="foto 5.jpeg">
<img src="foto 9.jpeg">
</div>

<div class="section fade">
  <a class="btn" href="https://wa.me/5492920608922" target="_blank">
    Confirmar asistencia 💌
  </a>
</div>

<script>

// música
const musica = document.getElementById("musica");
musica.volume = 0.3;

document.addEventListener("click", () => {
  musica.play();
}, { once: true });

// estrellas
function crearEstrella(){
  const estrella = document.createElement("div");
  estrella.classList.add("estrella");
  estrella.innerHTML="✨";

  estrella.style.left = Math.random()*100+"vw";
  estrella.style.animationDuration = (Math.random()*3+2)+"s";

  document.querySelector(".cielo").appendChild(estrella);

  setTimeout(()=>estrella.remove(),5000);
}

setInterval(crearEstrella,300);

// contador
const fechaEvento = new Date("May 16, 2026 21:00:00").getTime();

setInterval(() => {
  const ahora = new Date().getTime();
  const distancia = fechaEvento - ahora;

  const dias = Math.floor(distancia / (1000*60*60*24));
  const horas = Math.floor((distancia % (1000*60*60*24)) / (1000*60*60));

  document.getElementById("contador").innerHTML =
    dias + " días " + horas + " hs";
}, 1000);

// animación scroll
const elementos = document.querySelectorAll(".fade");

window.addEventListener("scroll", () => {
  elementos.forEach(el => {
    const pos = el.getBoundingClientRect().top;
    if (pos < window.innerHeight - 100) {
      el.classList.add("visible");
    }
  });
});

</script>

</body>
</html>
